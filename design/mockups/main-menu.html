<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cardweave — Main Menu</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Inter:wght@300;400;500;600&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a0a12;
    font-family: 'Inter', sans-serif;
    padding: 20px;
  }

  .menu {
    position: relative;
    width: 1100px;
    height: 700px;
    background: radial-gradient(ellipse at 50% 20%, #161625 0%, #0d0d16 50%, #08080e 100%);
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 0 80px rgba(100, 80, 200, 0.06), 0 0 200px rgba(0, 0, 0, 0.6);
    display: grid;
    grid-template-columns: 1fr 1fr;
    border: 1px solid rgba(255, 215, 0, 0.06);
  }

  /* Subtle card-pattern overlay */
  .menu::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 20% 30%, rgba(60, 40, 120, 0.10) 0%, transparent 45%),
      radial-gradient(circle at 80% 70%, rgba(180, 120, 40, 0.05) 0%, transparent 40%);
    pointer-events: none;
    z-index: 0;
  }

  /* === LEFT PANEL === */
  .left {
    position: relative;
    padding: 60px 50px 40px;
    display: flex;
    flex-direction: column;
    z-index: 1;
  }

  .logo-sub {
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(255, 215, 0, 0.35);
    margin-bottom: 6px;
    font-weight: 500;
  }

  .logo {
    font-family: 'Cinzel', serif;
    font-weight: 900;
    font-size: 54px;
    line-height: 1;
    background: linear-gradient(135deg, #ffd43b 0%, #f59f00 40%, #ffec99 60%, #ffd43b 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 1px;
    margin-bottom: 6px;
    filter: drop-shadow(0 2px 12px rgba(255, 215, 0, 0.08));
  }

  .logo-subtitle {
    font-size: 14px;
    color: rgba(255, 255, 255, 0.3);
    font-weight: 300;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    margin-bottom: 50px;
  }

  .nav {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: auto;
  }

  .nav-btn {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 24px;
    border: 1px solid rgba(255, 255, 255, 0.06);
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.02);
    color: rgba(255, 255, 255, 0.5);
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
    text-decoration: none;
    font-family: 'Inter', sans-serif;
    width: 100%;
    text-align: left;
    position: relative;
    outline: none;
  }

  .nav-btn:hover {
    background: rgba(255, 255, 255, 0.06);
    border-color: rgba(255, 255, 255, 0.12);
    color: rgba(255, 255, 255, 0.85);
    transform: translateX(4px);
  }

  .nav-btn:focus-visible {
    box-shadow: 0 0 0 2px rgba(255, 215, 0, 0.3);
  }

  .nav-btn.play {
    background: linear-gradient(135deg, rgba(255, 215, 0, 0.10), rgba(255, 215, 0, 0.03));
    border-color: rgba(255, 215, 0, 0.15);
    color: #ffd43b;
    font-weight: 600;
    font-size: 18px;
    padding: 18px 24px;
  }

  .nav-btn.play:hover {
    background: linear-gradient(135deg, rgba(255, 215, 0, 0.18), rgba(255, 215, 0, 0.06));
    border-color: rgba(255, 215, 0, 0.3);
    box-shadow: 0 0 30px rgba(255, 215, 0, 0.05);
    color: #ffec99;
  }

  .nav-btn .icon {
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    opacity: 0.6;
    flex-shrink: 0;
  }

  .nav-btn.play .icon { opacity: 1; }
  .nav-btn.play .icon { font-size: 20px; }

  .nav-btn .key-hint {
    margin-left: auto;
    font-size: 11px;
    color: rgba(255, 255, 255, 0.12);
    letter-spacing: 1px;
    font-weight: 400;
    font-family: monospace;
    padding: 2px 8px;
    border: 1px solid rgba(255, 255, 255, 0.04);
    border-radius: 4px;
    background: rgba(255, 255, 255, 0.02);
  }

  .footer-info {
    margin-top: 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    color: rgba(255, 255, 255, 0.12);
    letter-spacing: 1px;
  }

  .footer-info .version {
    font-family: monospace;
    color: rgba(255, 255, 255, 0.08);
  }

  .footer-info .tag {
    padding: 4px 12px;
    border: 1px solid rgba(255, 215, 0, 0.06);
    border-radius: 4px;
    font-size: 10px;
    color: rgba(255, 215, 0, 0.3);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  /* === RIGHT PANEL === */
  .right {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    z-index: 1;
  }

  .right::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 1px;
    background: linear-gradient(to bottom, transparent 10%, rgba(255, 215, 0, 0.08) 40%, rgba(255, 215, 0, 0.04) 60%, transparent 90%);
  }

  /* Decorative circles */
  .right::after {
    content: '';
    position: absolute;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    border: 1px solid rgba(255, 215, 0, 0.02);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }

  .card-frame {
    position: relative;
    width: 280px;
    height: 400px;
    border: 1px solid rgba(255, 215, 0, 0.10);
    border-radius: 16px;
    background: radial-gradient(ellipse at 50% 15%, #1c1c30, #121220);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 24px 24px;
    box-shadow:
      0 20px 60px rgba(0, 0, 0, 0.5),
      inset 0 1px 0 rgba(255, 255, 255, 0.02);
  }

  .card-frame::before {
    content: '';
    position: absolute;
    inset: -1px;
    border-radius: 17px;
    background: linear-gradient(
      135deg,
      rgba(255, 215, 0, 0.12) 0%,
      rgba(255, 255, 255, 0.02) 25%,
      rgba(0, 0, 0, 0) 50%,
      rgba(255, 215, 0, 0.04) 75%,
      rgba(255, 215, 0, 0.08) 100%
    );
    z-index: -1;
    pointer-events: none;
  }

  .card-rarity {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 3.5px;
    text-transform: uppercase;
    color: rgba(255, 215, 0, 0.4);
    margin-bottom: 18px;
    font-weight: 600;
  }

  .card-portrait {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 30%, #b197fc, #6741d9);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
    position: relative;
    box-shadow: 0 0 40px rgba(120, 80, 200, 0.15), inset 0 -2px 10px rgba(0,0,0,0.2);
  }

  .card-portrait::after {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    border: 1px solid rgba(255, 215, 0, 0.10);
  }

  .portrait-icon {
    font-size: 52px;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3));
    line-height: 1;
  }

  .card-name {
    font-family: 'Cinzel', serif;
    font-size: 26px;
    font-weight: 700;
    color: #fff3bf;
    margin-bottom: 4px;
    letter-spacing: 0.5px;
  }

  .card-class {
    font-size: 12px;
    color: rgba(255, 255, 255, 0.3);
    letter-spacing: 2.5px;
    text-transform: uppercase;
    margin-bottom: 22px;
  }

  .card-stats {
    display: flex;
    gap: 24px;
    width: 100%;
    justify-content: center;
  }

  .stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .stat-label {
    font-size: 10px;
    color: rgba(255, 255, 255, 0.2);
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }

  .stat-value {
    font-size: 20px;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.7);
  }

  .stat-value.hp { color: #69db7c; }
  .stat-value.energy { color: #74c0fc; }
  .stat-value.atk { color: #ff8787; }

  /* Card slots indicator */
  .card-slots {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 22px;
  }

  .slot-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.04);
    transition: all 0.2s;
  }

  .slot-dot.filled {
    background: rgba(255, 215, 0, 0.25);
    border-color: rgba(255, 215, 0, 0.12);
    box-shadow: 0 0 6px rgba(255, 215, 0, 0.04);
  }

  .slot-count {
    font-size: 10px;
    color: rgba(255, 255, 255, 0.12);
    margin-left: 4px;
    letter-spacing: 1px;
    font-family: monospace;
  }

  /* === Responsive === */
  @media (max-width: 800px) {
    .menu {
      grid-template-columns: 1fr;
      height: auto;
      max-width: 500px;
    }
    .left { padding: 40px 30px; }
    .logo { font-size: 36px; }
    .right { padding: 40px 20px 60px; }
    .right::before, .right::after { display: none; }
    .card-frame { width: 240px; height: auto; padding-bottom: 30px; }
    .logo-subtitle { margin-bottom: 36px; }
    .footer-info { margin-top: 30px; }
  }
</style>
</head>
<body>
<div class="menu">

  <!-- LEFT PANEL -->
  <div class="left">
    <div class="logo-sub">Nous Research prezintă</div>
    <h1 class="logo">CARDWEAVE</h1>
    <div class="logo-subtitle">Auto-battle card crafting</div>

    <div class="nav">
      <button class="nav-btn play" onclick="console.log('Play clicked')">
        <span class="icon">&#9654;</span>
        Joacă
        <span class="key-hint">Enter</span>
      </button>

      <button class="nav-btn" onclick="console.log('Collection clicked')">
        <span class="icon">&#9826;</span>
        Colecție
        <span class="key-hint">C</span>
      </button>

      <button class="nav-btn" onclick="console.log('Settings clicked')">
        <span class="icon">&#9881;</span>
        Setări
        <span class="key-hint">S</span>
      </button>
    </div>

    <div class="footer-info">
      <span class="version">v0.1.0</span>
      <span class="tag">Offline-first</span>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right">
    <div class="card-frame">
      <div class="card-rarity">Starter</div>

      <div class="card-portrait">
        <span class="portrait-icon">&#128009;</span>
      </div>

      <div class="card-name">Ignis</div>
      <div class="card-class">Dragonkin &middot; Mage</div>

      <div class="card-stats">
        <div class="stat">
          <span class="stat-label">HP</span>
          <span class="stat-value hp">90</span>
        </div>
        <div class="stat">
          <span class="stat-label">Energie</span>
          <span class="stat-value energy">+5</span>
        </div>
        <div class="stat">
          <span class="stat-label">Atac</span>
          <span class="stat-value atk">12</span>
        </div>
      </div>

      <div class="card-slots">
        <div class="slot-dot filled"></div>
        <div class="slot-dot filled"></div>
        <div class="slot-dot filled"></div>
        <div class="slot-dot"></div>
        <div class="slot-dot"></div>
        <div class="slot-dot"></div>
        <span class="slot-count">3/6</span>
      </div>
    </div>
  </div>

</div>
</body>
</html>
